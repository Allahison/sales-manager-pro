kind = "web"
previewPath = "/"
title = "Sales Management System"
version = "1.0.0"
id = "artifacts/sales-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25207
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/sales-app run dev"

[services.env]
PORT = "25207"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/sales-app", "run", "build"]
publicDir = "artifacts/sales-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
